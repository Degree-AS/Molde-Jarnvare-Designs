<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobile drawer preview — Molde Jarnvare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/styles/index.css">
</head>
<body>

<!-- data-preview-open="true" forces the drawer and backdrop visible -->
<header class="site-header" data-preview-open="true">
  <div class="site-header__inner">
    <a class="site-header__logo" href="/" aria-label="Molde Jarnvare"><img src="../../src/assets/logos/molde-jarnvare-positive.png" alt="Molde Jarnvare" class="site-header__logo-img"></a>
    <div class="site-header__search">
      <form class="search-bar" role="search">
        <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-bar__input" type="search" placeholder="Søk i 30 000+ artikler…" />
        <button class="search-bar__submit" type="submit">Søk</button>
      </form>
    </div>
    <div class="site-header__actions">
      <button class="site-header__action" aria-label="Min konto">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
      </button>
      <button class="site-header__action" aria-label="Handlekurv (3)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 6h15l-1.5 9H7.5z"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/></svg>
        <span class="badge badge--numeric site-header__action-badge">3</span>
      </button>
      <button class="site-header__hamburger" type="button" aria-label="Lukk hovedmeny" aria-controls="site-nav-drawer" aria-expanded="true">
        <span class="site-header__hamburger-icon" aria-hidden="true"></span>
      </button>
    </div>
  </div>

  <div class="site-header__drawer" id="site-nav-drawer" role="dialog" aria-modal="true" aria-label="Hovedmeny">
    <div class="site-header__drawer-header">
      <span class="t-overline" style="color: var(--mj-blue);">Meny</span>
      <button class="site-header__drawer-close" type="button" aria-label="Lukk meny">&times;</button>
    </div>
    <nav class="site-header__drawer-nav" aria-label="Produktkategorier (mobil)">
      <a href="#">Festemidler</a>
      <a href="#">Verktøy</a>
      <a href="#">Verneutstyr</a>
      <a href="#">Hydraulikk</a>
      <a href="#">Sveis</a>
      <a href="#">Industri</a>
      <a href="#">Slipemidler</a>
      <a href="#">Tetninger og pakninger</a>
      <a href="#">Lim og kjemikalier</a>
      <a href="#">Måleinstrumenter</a>
      <a href="#">Smøring og rens</a>
      <a href="#">Bil og verksted</a>
      <a href="#">Lagring og logistikk</a>
      <a href="#">Elektro</a>
      <a href="#">Skilt og merking</a>
    </nav>
  </div>
</header>
<div class="site-header__drawer-backdrop" aria-hidden="true"></div>

<!-- Minimal page bg so the drawer doesn't sit on a blank canvas -->
<main style="padding: 24px; min-height: 600px; opacity: 0.4;">
  <h1 class="t-h2" style="margin: 0 0 12px;">Verktøyet du trenger, på lager i Molde.</h1>
  <p style="color: var(--color-text-secondary);">Mer enn 30 000 unike artikler …</p>
</main>

</body>
</html>
