<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Søkeresultat — Molde Jarnvare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/index.css">

<body>

<header class="site-header">
  <div class="site-header__inner">
    <a class="site-header__logo" href="/" aria-label="Molde Jarnvare"><img src="../assets/logos/molde-jarnvare-positive.png" alt="Molde Jarnvare" class="site-header__logo-img"></a>
    <div class="site-header__search">
      <form class="search-bar" role="search" style="position: relative;">
        <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-bar__input" type="search" value="bolt" />
        <button class="search-bar__submit">Søk</button>
      </form>
    </div>
  </div>
</header>

<main class="container" style="padding-block: var(--s-7);">
  <h1 class="t-h2" style="margin-bottom: var(--s-3);">Søkeresultat for «bolt»</h1>
  <p style="color: var(--color-text-secondary); margin-bottom: var(--s-6);">142 treff i sortimentet</p>

  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: var(--s-4);">
    <article class="product-card">
      <div class="product-card__media"></div>
      <span class="product-card__sku">4815-162-30</span>

      <div class="product-card__price">kr 2,80<span class="product-card__price-suffix">eks. mva</span></div>
    </article>
    <article class="product-card">
      <div class="product-card__media"></div>
      <span class="product-card__sku">4830-180-50</span>
      <h3 class="product-card__title"><a href="#">Maskinskrue M10 × 50 mm galvanisert</a></h3>
      <span class="stock-indicator stock-indicator--in">På lager</span>
      <div class="product-card__price">kr 4,20<span class="product-card__price-suffix">eks. mva</span></div>
    </article>
  </div>
</main>

<footer class="site-footer">
  <div class="site-footer__inner"><div class="site-footer__bottom"><span>&copy; 2026 Molde Jarnvare AS</span></div></div>
