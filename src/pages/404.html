<!doctype html>
<html lang="nb">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Siden finnes ikke — Molde Jarnvare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/index.css">
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">
    <a class="site-header__logo" href="/" aria-label="Molde Jarnvare"><img src="../assets/logos/molde-jarnvare-positive.png" alt="Molde Jarnvare" class="site-header__logo-img"></a>
  </div>
</header>

<main class="container container--narrow" style="padding-block: var(--s-12);">
  <div class="error-state">
    <div class="error-state__icon" style="font-size: 56px; line-height: 1;">404</div>
    <h1 class="error-state__title">Vi fant ikke det du leter etter</h1>
    <p class="error-state__desc">
      Siden eller artikkelen er enten flyttet, slettet, eller adressen er feil.
      Prøv å søke i sortimentet — eller ta kontakt med produktansvarlig om du
      trenger hjelp.
    </p>
    <div class="error-state__actions">
      <a class="btn btn--primary" href="home.html">Til forsiden</a>
      <a class="btn btn--outline" href="search.html">Søk i sortimentet</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="site-footer__inner"><div class="site-footer__bottom"><span>&copy; 2026 Molde Jarnvare AS</span></div></div>
</footer>

</body>
</html>
